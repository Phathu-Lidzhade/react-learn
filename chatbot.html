<!doctype html>
<html>
  <head>
    <title>Chatbot</title>
    <style>

      body{
        font-family: Arial, Helvetica, sans-serif;
        margin-top: 0px;
        margin-bottom: 0px;
      }
      .send-btn{
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }
      .chat-input{
        padding: 12px 15px;
        border-width: 1px;
        border: 3px solid #ccc;
        border-radius: 10px;
        font-size: 15px;

        flex-grow: 1;
      }
      .chat-input:focus{
        border-color: rgb(114, 197, 137);
        outline: none;
      }
      .chat-input-container{
        display: flex;
        margin-bottom: 60px;
      }
      .app-container{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      p {
        text-align: center;
        color: #b0b0b0;
      }
      .chat-message-user{
        display: flex;
        justify-content: flex-end;
        align-items: start;
      }
      .chat-message-robot{
        display: flex;
        justify-content: flex-start;
        align-items: start;
      }
      .chat-message-text{
        background-color: rgb(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      }
      .chat-message-profile{
        width: 45px;
      }
      .chat-messages-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }
      .loading-spinner{
        height: 40px;
        margin: -15px;
      }

    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput({
        chatMessages,
        setChatMessages,
        isLoading,
        setIsLoading,
      }) {
        const [inputText, setInputText] = React.useState("");

        function saveInputText(event) {
          setInputText(event.target.value);
        }

        async function sendMessage() {
          // Prevent sending if loading or if input is empty
          if (isLoading || inputText.trim() === "") {
            return;
          }

          setInputText("");
          setIsLoading(true);

          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: "user",
              id: crypto.randomUUID(),
            },
          ];

          setChatMessages([
            ...newChatMessages,
            // This creates a temporary Loading... message.
            // Because we don't save this message in newChatMessages,
            // it will be remove later, when we add the response.
            {
              message: <img className="loading-spinner" src="images/loading-spinner.gif" />,
              sender: "robot",
              id: crypto.randomUUID(),
            },
          ]);

          const response = await Chatbot.getResponseAsync(inputText);

          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: "robot",
              id: crypto.randomUUID(),
            },
          ]);
          setIsLoading(false);
        }

        function handleKeyDown(event) {
          if (event.key === "Enter") {
            sendMessage();
          } else if (event.key === "Escape") {
            setInputText("");
          }
        }

        return (
          <div className="chat-input-container">
            <input
              type="text"
              placeholder="Send a message to Chatbot"
              size="30"
              onChange={saveInputText}
              value={inputText}
              onKeyDown={handleKeyDown}
              disabled={isLoading}
              className="chat-input"
            />
            <button
              type="button"
              onClick={sendMessage}
              disabled={isLoading || inputText.trim() === ""}
              className="send-btn"
            >
              Send
            </button>
          </div>
        );
      }

      function ChatMessage({ message, sender }) {
        //const message = props.message;
        //const sender = props.sender;
        //const { message, sender } = props;

        /*
        if (sender === "robot") {
          return(
            <div>
              <img src="images/robot.png" 
                width="50"
              />
              {message}
            </div>
          );
        }
        */

        return (
          <div className={
            sender === 'user' 
              ? 'chat-message-user' 
              : 'chat-message-robot'
            }>
            {sender === "robot" && 
              (<img src="images/robot.png" 
              className="chat-message-profile" />)
            }

            <div className="chat-message-text">
              {message}
            </div>

            {sender === "user" && 
              (<img src="images/user.png" 
              className="chat-message-profile" />)
            }
          </div>
        );
      }

      function useAutoScroll(dependencies) {
        const chatMessagesRef = React.useRef(null);
        React.useEffect(() => {
          const containerElem = chatMessagesRef.current;
          if (containerElem) {
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, [dependencies]);

        return chatMessagesRef;
      }

      function ChatMessages({ chatMessages }) {
        const chatMessagesRef = useAutoScroll(chatMessages);

        return (
          <div 
            className="chat-messages-container"
            ref={chatMessagesRef}
          >
            {chatMessages.map((chatMessage) => (
              <ChatMessage
                message={chatMessage.message}
                sender={chatMessage.sender}
                key={chatMessage.id}
              />
            ))}
          </div>
        );
      }

      function App() {
        const [isLoading, setIsLoading] = React.useState(false);

        const [chatMessages, setChatMessages] = React.useState([]);
        // const chatMessages = array[0];
        // const setChatMessages = array[1];
        // const [ chatMessages, setChatMessages ] = array;

        return (
          <div className="app-container">
            <p>Welcome to the chatbot project! Send a message using the textbox below</p>
            <ChatMessages chatMessages={chatMessages} />
            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
              isLoading={isLoading}
              setIsLoading={setIsLoading}
            />
          </div>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
